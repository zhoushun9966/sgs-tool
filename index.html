<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀OL文案小助手</title>
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/tesseract.js/4.0.2/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #7d5233; --accent: #d35400; --bg: #f4f1ea; --card: #ffffff;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg); margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 1200px; }
        header {
            text-align: center; margin-bottom: 15px; padding: 12px;
            background: var(--card); border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-top: 4px solid var(--primary);
        }
        h1 { color: var(--primary); margin: 0; font-size: 20px; letter-spacing: 1px; }
        
        /* 搜索识别区 */
        .search-area { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box { flex: 1; position: relative; }
        .search-box input {
            width: 100%; padding: 10px 12px; border-radius: 6px;
            border: 1px solid #ccc; box-sizing: border-box; outline: none; font-size: 14px;
        }
        .btn-ocr {
            background: #27ae60; color: white; padding: 0 12px;
            border-radius: 6px; cursor: pointer; display: flex;
            align-items: center; font-weight: bold; font-size: 13px;
            white-space: nowrap; transition: 0.2s; border: none;
        }
        .btn-ocr:hover { background: #219150; }

        #ocr-status {
            font-size: 12px; color: var(--accent); background: #fff3e0;
            padding: 5px; border-radius: 4px; text-align: center;
            margin-bottom: 10px; display: none; width: 100%;
        }

        /* 紧凑布局 */
        .section-title {
            display: flex; align-items: center; margin: 15px 0 8px;
            font-size: 16px; color: var(--primary); font-weight: bold;
        }
        .section-title::before {
            content: ""; width: 4px; height: 16px; background: var(--primary);
            margin-right: 8px; border-radius: 2px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 10px;
        }
        .card {
            background: var(--card); border-radius: 6px; padding: 10px;
            border: 1px solid rgba(0,0,0,0.05); transition: 0.2s;
            display: flex; flex-direction: column;
        }
