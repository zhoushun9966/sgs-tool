<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀OL文案小助手</title>
    <style>
        :root { --primary: #7d5233; --accent: #d35400; --bg: #f4f1ea; --card: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        header { text-align: center; margin-bottom: 15px; padding: 12px; background: var(--card); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        h1 { color: var(--primary); margin: 0; font-size: 20px; }
        .search-area { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box { flex: 1; }
        .search-box input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; outline: none; }
        .btn-ocr { background: #27ae60; color: white; padding: 0 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; font-weight: bold; font-size: 13px; white-space: nowrap; border:none; }
        #ocr-status { font-size: 12px; color: var(--accent); background: #fff3e0; padding: 8px; border-radius: 4px; text-align: center; margin-bottom: 10px; display: none; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; width: 100%; }
        .card { background: var(--card); border-radius: 6px; padding: 10px; border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card-label { font-weight: bold; font-size: 14px; margin-bottom: 2px; }
        .card-val { background: #f8f9fa; padding: 8px; border-radius: 4px; font-size: 12px; color: #444; border-left: 2px solid #ddd; margin-bottom: 8px; flex-grow: 1; word-break: break-all; }
        .btn-copy { background: var(--primary); color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 20px; border-radius: 20px; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🗡 三国杀OL文案小助手</h1>
        <div id="status" style="font-size:11px; color:#95a5a6; margin-top:4px;">正在初始化云端数据...</div>
    </header>

    <div id="ocr-status">正在启动轻量级引擎 (2MB)...</div>

    <div class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索文案 或 粘贴截图..." oninput="handleSearch()">
        </div>
        <label class="btn-ocr">
            📷 选图识别
            <input type="file" accept="image/*" style="display:none" onchange="handleImage(this.files[0])">
        </label>
    </div>

    <div id="ui-content" style="width: 100%; text-align: center; color: #999; padding-top: 50px;">数据加载中...</div>
</div>
<div id="toast">复制成功</div>

<script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/tesseract.js/2.1.1/tesseract.min.js"></script>

<script>
    const CONFIG = { owner: 'zhoushun9966', repo: 'sgs-data', path: 'data.json' };
    let allData = [];

    async function fetchData() {
        const url = `https://gitee.com/api/v5/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        try {
            const res = await fetch(url);
            const json = await res.json();
            const content = decodeURIComponent(escape(window.atob(json.content)));
            allData = JSON.parse(content).sections || JSON.parse(content);
            render(allData);
            document.getElementById('status').innerText = "✅ 文案同步成功";
        } catch (e) { document.getElementById('status').innerText = "❌ 加载失败"; }
    }

    function render(sections) {
        const container = document.getElementById('ui-content');
        container.innerHTML = '';
        (Array.isArray(sections) ? sections : [sections]).forEach(sec => {
            if(!sec.items) return;
            const grid = document.createElement('div');
            grid.className = 'grid';
            sec.items.forEach(item => {
                grid.innerHTML += `<div class="card"><div class="card-label">${item.label}</div><div class="card-val">${item.val}</div><button class="btn-copy" onclick="doCopy('${item.val.replace(/'/g, "\\'")}')">复制</button></div>`;
            });
            container.appendChild(grid);
        });
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.map(sec => ({
            ...sec,
            items: sec.items.filter(item => item.label.toLowerCase().includes(query) || item.val.toLowerCase().includes(query))
        }));
        render(filtered);
    }

    async function handleImage(file) {
        if (!file) return;
        const status = document.getElementById('ocr-status');
        status.style.display = 'block';
        status.innerText = "🚀 极速引擎加载中...";

        try {
            // 使用 Tesseract 官方推荐的最精简版本和极速模型
            const { data: { text } } = await Tesseract.recognize(file, 'chi_sim', {
                langPath: 'https://cdn.jsdelivr.net/gh/naptha/tessdata@gh-pages/4.0.0_fast', 
                logger: m => {
                    if(m.status === 'recognizing text') status.innerText = "进度: " + Math.round(m.progress * 100) + "%";
                }
            });

            const cleanText = text.trim().replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
            if (cleanText) {
                document.getElementById('searchInput').value = cleanText;
                handleSearch();
                status.innerText = "✅ 识别结果: " + cleanText;
            } else { status.innerText = "⚠️ 未能识别文字"; }
            setTimeout(() => { status.style.display = 'none'; }, 4000);
        } catch (e) {
            status.innerText = "❌ 识别超时，请手动搜索";
            console.error(e);
        }
    }

    window.addEventListener('paste', e => {
        const item = (e.clipboardData || e.originalEvent.clipboardData).items[0];
        if (item && item.type.indexOf('image') !== -1) handleImage(item.getAsFile());
    });

    function doCopy(txt) {
        navigator.clipboard.writeText(txt).then(() => {
            const t = document.getElementById('toast'); t.style.visibility = "visible";
            setTimeout(() => t.style.visibility = "hidden", 1500);
        });
    }
    fetchData();
</script>
</body>
</html>
