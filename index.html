<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀OL文案小助手</title>
    <style>
        /* 1. 现代感配色与全局样式 */
        :root {
            --primary-color: #7d5233; /* 古典木质色 */
            --accent-color: #d35400;  /* 亮桔色点缀 */
            --bg-color: #f4f1ea;      /* 宣纸色背景 */
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. 容器与头部 */
        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .status-badge {
            display: inline-block;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e8f5e9;
            color: #2e7d32;
            margin-top: 10px;
        }

        /* 3. 搜索框 */
        .search-box {
            width: 100%;
            margin-bottom: 30px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(211, 84, 0, 0.2);
        }

        /* 4. 分类标题 */
        .section-title {
            display: flex;
            align-items: center;
            margin: 30px 0 15px;
            font-size: 20px;
            color: var(--primary-color);
        }

        .section-title::before {
            content: "";
            width: 6px;
            height: 24px;
            background: var(--primary-color);
            margin-right: 12px;
            border-radius: 3px;
        }

        /* 5. 卡片布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .card-label {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 15px;
        }

        .card-val {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #444;
            border-left: 3px solid #ddd;
            word-break: break-all;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        /* 6. 按钮美化 */
        .btn-copy {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-copy:hover {
            background-color: var(--accent-color);
        }

        /* 7. 弹窗通知 */
        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            z-index: 1000;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🗡 三国杀OL文案小助手</h1>
        <div id="status" class="status-badge">正在同步云端文案...</div>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索武将、技能或文案关键词..." oninput="handleSearch()">
    </div>

    <div id="ui-content"></div>
</div>

<div id="toast">已成功复制到剪贴板</div>

<script>
    const CONFIG = {
        owner: 'zhoushun9966',
        repo: 'sgs-data',
        path: 'data.json'
    };

    let allData = []; // 存放原始数据用于搜索

    async function fetchData() {
        const statusEl = document.getElementById('status');
        const url = `https://gitee.com/api/v5/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        
        try {
            const res = await fetch(url);
            const json = await res.json();
            const content = decodeURIComponent(escape(window.atob(json.content)));
            allData = JSON.parse(content).sections;
            render(allData);
            statusEl.innerText = "✅ 云端文案已同步";
        } catch (e) {
            statusEl.innerText = "❌ 同步失败，请检查网络";
            statusEl.style.background = "#ffebee";
            statusEl.style.color = "#c62828";
        }
    }

    function render(sections) {
        const container = document.getElementById('ui-content');
        container.innerHTML = '';
        
        sections.forEach(sec => {
            if(sec.items.length === 0) return;

            const sectionDiv = document.createElement('div');
            sectionDiv.innerHTML = `<div class="section-title">${sec.title}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'grid';
            
            sec.items.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-label">${item.label}</div>
                        <div class="card-desc">${item.desc}</div>
                        <div class="card-val">${item.val}</div>
                        <button class="btn-copy" onclick="doCopy('${item.val.replace(/'/g, "\\'")}')">一键复制</button>
                    </div>
                `;
            });
            
            sectionDiv.appendChild(grid);
            container.appendChild(sectionDiv);
        });
    }

    // 搜索过滤逻辑
    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.map(sec => ({
            ...sec,
            items: sec.items.filter(item => 
                item.label.toLowerCase().includes(query) || 
                item.val.toLowerCase().includes(query) ||
                item.desc.toLowerCase().includes(query)
            )
        }));
        render(filtered);
    }

    function doCopy(txt) {
        navigator.clipboard.writeText(txt).then(() => {
            const t = document.getElementById('toast');
            t.style.visibility = "visible";
            setTimeout(() => t.style.visibility = "hidden", 2000);
        });
    }

    fetchData();
</script>
</body>
</html>
